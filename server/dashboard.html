<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据看板 - 视频去水印助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
    
    .topbar { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 10px; }
    .topbar h1 { font-size: 1.2rem; background: linear-gradient(135deg, #fb7299, #00a1d6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-right { display: flex; gap: 12px; align-items: center; }
    .topbar a { color: #fb7299; text-decoration: none; font-size: 0.85rem; }
    
    /* 时间范围按钮组 */
    .range-bar { display: flex; gap: 0; padding: 12px 24px; flex-wrap: wrap; }
    .range-btn { padding: 7px 14px; cursor: pointer; font-size: 0.8rem; color: #888; background: #1a1a2e; border: 1px solid #262640; transition: all 0.2s; }
    .range-btn:first-child { border-radius: 8px 0 0 8px; }
    .range-btn:last-child { border-radius: 0 8px 8px 0; }
    .range-btn:hover { color: #e0e0e0; border-color: #444; }
    .range-btn.active { color: #fff; background: linear-gradient(135deg, #fb7299, #e91e63); border-color: #fb7299; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; padding: 14px 24px; }
    .stat-card { background: #1a1a2e; border: 1px solid #262640; border-radius: 12px; padding: 18px; text-align: center; transition: border-color 0.3s; }
    .stat-card:hover { border-color: #fb7299; }
    .stat-card .label { font-size: 0.78rem; color: #888; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #fb7299, #00a1d6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-card .sub { font-size: 0.72rem; color: #666; margin-top: 4px; }
    
    .section { padding: 0 24px 18px; }
    .section-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 10px; color: #ccc; }
    
    .chart-container { background: #1a1a2e; border: 1px solid #262640; border-radius: 12px; padding: 16px; margin-bottom: 18px; overflow-x: auto; }
    .chart-bar { display: flex; align-items: flex-end; gap: 3px; height: 120px; padding: 0 4px; min-width: fit-content; }
    .bar-col { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 22px; flex: 1; }
    .bar-fill { width: 100%; border-radius: 3px 3px 0 0; transition: height 0.5s; min-height: 1px; }
    .bar-fill.visits { background: linear-gradient(180deg, #00a1d6, #0078a8); }
    .bar-fill.downloads { background: linear-gradient(180deg, #fb7299, #c44569); }
    .bar-label { font-size: 8px; color: #666; white-space: nowrap; }
    .bar-value { font-size: 8px; color: #999; }
    .chart-legend { display: flex; gap: 16px; justify-content: center; margin-top: 8px; font-size: 0.75rem; color: #888; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 4px; vertical-align: middle; }
    
    .table-wrap { background: #1a1a2e; border: 1px solid #262640; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    thead { background: #16213e; }
    th { padding: 10px 12px; text-align: left; color: #999; font-weight: 500; white-space: nowrap; }
    td { padding: 8px 12px; border-top: 1px solid #1f1f3a; color: #ccc; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover td { background: rgba(251, 114, 153, 0.05); }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
    .tag-user { background: rgba(0, 161, 214, 0.2); color: #00a1d6; }
    .tag-guest { background: rgba(153, 153, 153, 0.15); color: #999; }
    
    .device-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .device-chip { background: #16213e; border: 1px solid #262640; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; display: flex; gap: 6px; align-items: center; }
    .device-chip .count { color: #fb7299; font-weight: 600; }
    
    .tabs { display: flex; gap: 0; padding: 0 24px; }
    .tab { padding: 10px 20px; cursor: pointer; font-size: 0.85rem; color: #888; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab:hover { color: #e0e0e0; }
    .tab.active { color: #fb7299; border-bottom-color: #fb7299; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .pwd-gate { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .pwd-card { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 32px; width: 360px; text-align: center; }
    .pwd-card h2 { font-size: 1.2rem; margin-bottom: 20px; color: #fb7299; }
    .pwd-card input { width: 100%; padding: 10px 14px; background: #16213e; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 0.95rem; outline: none; text-align: center; margin-bottom: 16px; }
    .pwd-card input:focus { border-color: #fb7299; }
    .pwd-card button { padding: 10px 24px; background: linear-gradient(135deg, #fb7299, #e91e63); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
    .pwd-card .err { color: #ff4757; font-size: 0.8rem; margin-top: 8px; }
    
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); padding: 10px; gap: 8px; }
      .section { padding: 0 12px 14px; }
      .range-bar { padding: 8px 12px; }
      .range-btn { padding: 5px 8px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <!-- 密码验证 -->
  <div id="pwdGate" class="pwd-gate">
    <div class="pwd-card">
      <h2>📊 数据看板</h2>
      <input type="password" id="pwdInput" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')unlock()">
      <br>
      <button onclick="unlock()">进入看板</button>
      <div class="err" id="pwdErr"></div>
    </div>
  </div>

  <!-- 看板主体 -->
  <div id="dashboard" style="display:none">
    <div class="topbar">
      <h1>📊 数据看板</h1>
      <div class="topbar-right">
        <span id="lastRefresh" style="font-size:0.75rem;color:#666;"></span>
        <label style="font-size:0.8rem;color:#888;display:flex;align-items:center;gap:4px;cursor:pointer;">
          <input type="checkbox" id="autoRefreshToggle" checked onchange="toggleAutoRefresh()"> 自动刷新
        </label>
        <a href="/admin">← 通告管理</a>
      </div>
    </div>

    <!-- 时间范围按钮 -->
    <div class="range-bar" id="rangeBar">
      <div class="range-btn active" data-range="today" onclick="selectRange('today',this)">今天</div>
      <div class="range-btn" data-range="3" onclick="selectRange('3',this)">3天</div>
      <div class="range-btn" data-range="7" onclick="selectRange('7',this)">7天</div>
      <div class="range-btn" data-range="14" onclick="selectRange('14',this)">14天</div>
      <div class="range-btn" data-range="30" onclick="selectRange('30',this)">1个月</div>
      <div class="range-btn" data-range="90" onclick="selectRange('90',this)">3个月</div>
      <div class="range-btn" data-range="180" onclick="selectRange('180',this)">6个月</div>
      <div class="range-btn" data-range="365" onclick="selectRange('365',this)">12个月</div>
      <div class="range-btn" data-range="all" onclick="selectRange('all',this)">全部</div>
    </div>

    <!-- IP 遮挡开关 -->
    <div style="padding:4px 24px;display:flex;align-items:center;gap:8px;font-size:0.8rem;color:#888">
      <label style="cursor:pointer;display:flex;align-items:center;gap:6px">
        <input type="checkbox" id="ipMaskToggle" checked onchange="toggleIPMask()" style="accent-color:#fb7299">
        <span>IP 地址遮挡</span>
      </label>
    </div>

    <!-- 概览卡片 -->
    <div class="grid" id="statsGrid"></div>

    <!-- 逐日趋势图 -->
    <div class="section" id="dailyChartSection" style="display:none">
      <div class="section-title">📈 逐日趋势</div>
      <div class="chart-container">
        <div class="chart-bar" id="dailyChart"></div>
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:#00a1d6"></span>访问</span>
          <span><span class="legend-dot" style="background:#fb7299"></span>解析</span>
        </div>
      </div>
    </div>

    <!-- 24小时分布图 -->
    <div class="section">
      <div class="section-title">🕐 24小时分布</div>
      <div class="chart-container">
        <div class="chart-bar" id="hourlyChart"></div>
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:#00a1d6"></span>访问</span>
          <span><span class="legend-dot" style="background:#fb7299"></span>解析</span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('downloads',this)">下载记录</div>
      <div class="tab" onclick="switchTab('visits',this)">访问记录</div>
      <div class="tab" onclick="switchTab('devices',this)">设备统计</div>
    </div>

    <div class="section tab-content active" id="tab-downloads">
      <div class="table-wrap">
        <table>
          <thead><tr><th>时间</th><th>用户</th><th>视频标题</th><th>UP主</th><th>IP</th><th>设备</th></tr></thead>
          <tbody id="downloadTable"></tbody>
        </table>
      </div>
    </div>

    <div class="section tab-content" id="tab-visits">
      <div class="table-wrap">
        <table>
          <thead><tr><th>时间</th><th>用户</th><th>路径</th><th>方法</th><th>IP</th><th>设备</th></tr></thead>
          <tbody id="visitTable"></tbody>
        </table>
      </div>
    </div>

    <div class="section tab-content" id="tab-devices">
      <div class="device-list" id="deviceList"></div>
    </div>
  </div>

  <script>
    let pwd = '';
    let currentRange = 'today';
    let currentData = null;

    function unlock() {
      pwd = document.getElementById('pwdInput').value;
      if (!pwd) { document.getElementById('pwdErr').textContent = '请输入密码'; return; }
      fetch('/api/admin/stats?password=' + encodeURIComponent(pwd) + '&range=today')
        .then(r => r.json())
        .then(d => {
          if (d.success) {
            document.getElementById('pwdGate').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            currentData = d.data;
            render(d.data);
          } else {
            document.getElementById('pwdErr').textContent = '密码错误';
          }
        })
        .catch(() => { document.getElementById('pwdErr').textContent = '无法连接服务器'; });
    }

    function selectRange(range, btn) {
      currentRange = range;
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      const param = range === 'today' ? 'range=today' : (range === 'all' ? 'range=all' : 'range=' + range);
      fetch('/api/admin/stats?password=' + encodeURIComponent(pwd) + '&' + param)
        .then(r => r.json())
        .then(d => { if (d.success) { currentData = d.data; render(d.data); } });
    }

    let ipMasked = true;

    function toggleIPMask() {
      ipMasked = document.getElementById('ipMaskToggle').checked;
      if (currentData) render(currentData);
    }

    function render(data) {
      const isToday = currentRange === 'today';
      const rangeLabel = {
        'today': '今日', '3': '近3天', '7': '近7天', '14': '近14天',
        '30': '近1个月', '90': '近3个月', '180': '近6个月', '365': '近12个月', 'all': '全部'
      }[currentRange] || '';

      // 获取总访问量（全部时间）
      const totalDays = data.availableDates?.length || data.dateCount || 1;

      // 概览卡片
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="label">${rangeLabel}总访问</div>
          <div class="value">${fmt(data.totalVisits)}</div>
          ${data.dateCount ? '<div class="sub">共 ' + data.dateCount + ' 天数据</div>' : ''}
        </div>
        <div class="stat-card">
          <div class="label">独立访客 (IP)</div>
          <div class="value">${fmt(data.uniqueVisitors)}</div>
        </div>
        <div class="stat-card">
          <div class="label">视频解析次数</div>
          <div class="value">${fmt(data.totalDownloads)}</div>
        </div>
        <div class="stat-card">
          <div class="label">登录 / 游客</div>
          <div class="value">${data.loggedInCount} <span style="font-size:1rem;-webkit-text-fill-color:#666">/</span> ${data.guestCount}</div>
        </div>
        <div class="stat-card">
          <div class="label">日均访问</div>
          <div class="value">${data.dateCount ? Math.round(data.totalVisits / data.dateCount) : data.totalVisits}</div>
        </div>
        <div class="stat-card">
          <div class="label">日均解析</div>
          <div class="value">${data.dateCount ? Math.round(data.totalDownloads / data.dateCount) : data.totalDownloads}</div>
        </div>
      `;

      // 逐日趋势图（多天时显示）
      const dailySection = document.getElementById('dailyChartSection');
      if (!isToday && data.dailyVisits && data.dailyVisits.length > 1) {
        dailySection.style.display = 'block';
        renderDailyChart(data.dailyVisits);
      } else {
        dailySection.style.display = 'none';
      }

      // 24小时分布图（始终显示）
      renderHourlyChart(data.hourlyVisits, data.hourlyDownloads);

      // 下载记录
      renderTable('downloadTable', data.recentDownloads, d => `<tr>
        <td>${fmtTime(d.time)}</td>
        <td>${d.user === '游客' ? '<span class="tag tag-guest">游客</span>' : '<span class="tag tag-user">' + esc(d.user) + '</span>'}</td>
        <td title="${esc(d.video?.title)}">${esc(d.video?.title || '-')}</td>
        <td>${esc(d.video?.author || '-')}</td>
        <td class="ip-cell">${displayIP(d.ip)}</td>
        <td>${esc(d.device)}</td>
      </tr>`, 6);

      // 访问记录
      renderTable('visitTable', data.recentVisits, v => `<tr>
        <td>${fmtTime(v.time)}</td>
        <td>${v.user === '游客' ? '<span class="tag tag-guest">游客</span>' : '<span class="tag tag-user">' + esc(v.user) + '</span>'}</td>
        <td>${esc(v.path)}</td>
        <td>${v.method}</td>
        <td class="ip-cell">${displayIP(v.ip)}</td>
        <td>${esc(v.device)}</td>
      </tr>`, 6);

      // 设备
      const dlist = document.getElementById('deviceList');
      if (!data.topDevices?.length) {
        dlist.innerHTML = '<div style="text-align:center;padding:30px;color:#555">暂无数据</div>';
      } else {
        dlist.innerHTML = data.topDevices.map(d =>
          `<div class="device-chip"><span>${esc(d.name)}</span><span class="count">${d.count}</span></div>`
        ).join('');
      }
    }

    function renderHourlyChart(visits, downloads) {
      const max = Math.max(...visits, ...downloads, 1);
      let html = '';
      for (let h = 0; h < 24; h++) {
        const vH = Math.round((visits[h] / max) * 100);
        const dH = Math.round((downloads[h] / max) * 100);
        html += `<div class="bar-col">
          <div class="bar-value">${visits[h] || ''}</div>
          <div style="display:flex;gap:2px;align-items:flex-end;width:100%;height:100%">
            <div class="bar-fill visits" style="height:${vH}%;flex:1"></div>
            <div class="bar-fill downloads" style="height:${dH}%;flex:1"></div>
          </div>
          <div class="bar-label">${h}</div>
        </div>`;
      }
      document.getElementById('hourlyChart').innerHTML = html;
    }

    function renderDailyChart(dailyVisits) {
      const maxV = Math.max(...dailyVisits.map(d => d.visits), 1);
      const maxD = Math.max(...dailyVisits.map(d => d.downloads), 1);
      const max = Math.max(maxV, maxD, 1);
      let html = '';
      for (const day of dailyVisits) {
        const vH = Math.round((day.visits / max) * 100);
        const dH = Math.round((day.downloads / max) * 100);
        const label = day.date.slice(5); // MM-DD
        html += `<div class="bar-col">
          <div class="bar-value">${day.visits || ''}</div>
          <div style="display:flex;gap:2px;align-items:flex-end;width:100%;height:100%">
            <div class="bar-fill visits" style="height:${vH}%;flex:1"></div>
            <div class="bar-fill downloads" style="height:${dH}%;flex:1"></div>
          </div>
          <div class="bar-label">${label}</div>
        </div>`;
      }
      document.getElementById('dailyChart').innerHTML = html;
    }

    function renderTable(id, items, rowFn, colspan) {
      const tbody = document.getElementById(id);
      if (!items?.length) {
        tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align:center;color:#555;padding:30px">暂无记录</td></tr>`;
      } else {
        tbody.innerHTML = items.map(rowFn).join('');
      }
    }

    function fmt(n) {
      if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return n;
    }

    function fmtTime(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function maskIP(ip) {
      if (!ip) return '-';
      const parts = ip.split('.');
      if (parts.length === 4) return parts[0] + '.' + parts[1] + '.*.*';
      return ip.replace(/::.*/, '::***');
    }

    function displayIP(ip) {
      if (!ip) return '-';
      return ipMasked ? maskIP(ip) : esc(ip);
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function switchTab(name, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`#tab-${name}`).classList.add('active');
      btn.classList.add('active');
    }

    // [#12] 自动刷新（30秒）
    let autoRefreshTimer = null;
    function updateRefreshTime() {
      const el = document.getElementById('lastRefresh');
      if (el) el.textContent = '刷新: ' + new Date().toLocaleTimeString('zh-CN');
    }
    function doAutoRefresh() {
      if (!pwd || !currentRange) return;
      const param = currentRange === 'today' ? 'range=today' : (currentRange === 'all' ? 'range=all' : 'range=' + currentRange);
      fetch('/api/admin/stats?password=' + encodeURIComponent(pwd) + '&' + param)
        .then(r => r.json())
        .then(d => { if (d.success) { currentData = d.data; render(d.data); updateRefreshTime(); } });
    }
    function toggleAutoRefresh() {
      const on = document.getElementById('autoRefreshToggle').checked;
      if (on) { autoRefreshTimer = setInterval(doAutoRefresh, 30000); }
      else { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
    }
    // 首次启动自动刷新
    autoRefreshTimer = setInterval(doAutoRefresh, 30000);
  </script>
</body>
</html>
