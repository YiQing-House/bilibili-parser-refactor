<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通告管理 - QYBILI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
    body.no-scroll { overflow: hidden; padding-right: 8px; }

    /* 密码门控 */
    .pwd-gate { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .pwd-card { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 32px; width: 360px; text-align: center; }
    .pwd-card h2 { font-size: 1.2rem; margin-bottom: 20px; color: #fb7299; }
    .pwd-card input { width: 100%; padding: 10px 14px; background: #16213e; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 0.95rem; outline: none; text-align: center; margin-bottom: 16px; }
    .pwd-card input:focus { border-color: #fb7299; }
    .pwd-card button { padding: 10px 24px; background: linear-gradient(135deg, #fb7299, #e91e63); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
    .pwd-card .err { color: #ff4757; font-size: 0.8rem; margin-top: 8px; }

    /* 管理主体 */
    .topbar { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 10px; }
    .topbar h1 { font-size: 1.2rem; background: linear-gradient(135deg, #fb7299, #00a1d6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar a { color: #00a1d6; text-decoration: none; font-size: 0.85rem; }
    .topbar a:hover { text-decoration: underline; }

    .wrap { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
    .card { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 28px; margin-bottom: 20px; }
    h2 { font-size: 1rem; margin-bottom: 14px; color: #ccc; }
    label { display: block; font-size: 0.82rem; color: #999; margin-bottom: 5px; margin-top: 14px; }
    input, textarea { width: 100%; padding: 9px 12px; background: #16213e; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 0.9rem; outline: none; font-family: inherit; }
    input:focus, textarea:focus { border-color: #fb7299; }
    textarea { min-height: 90px; resize: vertical; }
    .row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
    .toggle { position: relative; width: 40px; height: 22px; background: #333; border-radius: 11px; cursor: pointer; transition: background 0.3s; flex-shrink: 0; }
    .toggle.on { background: #fb7299; }
    .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.3s; }
    .toggle.on::after { transform: translateX(18px); }
    .btn { display: block; width: 100%; margin-top: 20px; padding: 10px; background: linear-gradient(135deg, #fb7299, #e91e63); color: white; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; }
    .btn:hover { opacity: 0.9; } .btn:disabled { opacity: 0.5; }

    /* Toast 通知 */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; font-size: 0.85rem; z-index: 9999; animation: toastIn 0.3s ease; pointer-events: none; }
    .toast.ok { background: rgba(46,213,115,0.9); color: #fff; }
    .toast.err { background: rgba(255,71,87,0.9); color: #fff; }
    .toast.info { background: rgba(0,161,214,0.9); color: #fff; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* 通告卡片 */
    .ann-list { display: flex; flex-direction: column; gap: 10px; }
    .ann-card-item { background: #16213e; border: 1px solid #262640; border-radius: 10px; padding: 14px; position: relative; transition: opacity 0.2s; }
    .ann-card-item.disabled { opacity: 0.5; }
    .ann-card-item .title { font-weight: 600; color: #fb7299; font-size: 0.9rem; margin-bottom: 4px; }
    .ann-card-item .content { font-size: 0.8rem; color: #aaa; line-height: 1.5; margin-bottom: 6px; white-space: pre-line; max-height: 4.5em; overflow: hidden; transition: max-height 0.3s ease; }
    .ann-card-item .content.expanded { max-height: 2000px; }
    .expand-btn { background: none; border: none; color: #fb7299; font-size: 0.75rem; cursor: pointer; padding: 0; margin-bottom: 6px; opacity: 0.8; }
    .expand-btn:hover { opacity: 1; }
    .ann-card-item .meta { font-size: 0.7rem; color: #666; display: flex; justify-content: space-between; align-items: center; }
    .btn-group { display: flex; gap: 6px; }
    .act-btn { background: none; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
    .act-btn[data-action="delete"] { border: 1px solid rgba(255,71,87,0.3); color: #ff4757; }
    .act-btn[data-action="delete"]:hover { background: rgba(255,71,87,0.1); }
    .act-btn[data-action="edit"] { border: 1px solid rgba(0,161,214,0.3); color: #00a1d6; }
    .act-btn[data-action="edit"]:hover { background: rgba(0,161,214,0.1); }
    .act-btn[data-action="toggle"] { border: 1px solid rgba(46,213,115,0.3); color: #2ed573; }
    .act-btn[data-action="toggle"].off { border-color: rgba(136,136,136,0.3); color: #888; }
    .act-btn[data-action="toggle"]:hover { background: rgba(46,213,115,0.1); }
    .act-btn[data-action="up"], .act-btn[data-action="down"] { border: 1px solid rgba(255,255,255,0.15); color: #aaa; font-size: 0.75rem; padding: 2px 6px; }
    .act-btn[data-action="up"]:hover, .act-btn[data-action="down"]:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .act-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .tag-on { color: #2ed573; } .tag-off { color: #888; }
    .empty { text-align: center; color: #555; padding: 20px; font-size: 0.85rem; }

    /* 编辑弹窗 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 24px; width: 460px; max-width: 90vw; }
    .modal h3 { color: #fb7299; margin-bottom: 14px; font-size: 1rem; }
    .modal textarea { min-height: 250px; font-size: 0.95rem; line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btns button { flex: 1; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; border: none; }
    .modal-btns .save { background: linear-gradient(135deg, #fb7299, #e91e63); color: white; }
    .modal-btns .cancel { background: #16213e; border: 1px solid #333; color: #e0e0e0; }

    /* 确认弹窗 */
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000; }
    .confirm-card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 24px; width: 320px; text-align: center; }
    .confirm-card p { margin-bottom: 20px; font-size: 0.9rem; color: #e0e0e0; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btns button { flex: 1; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; border: none; }
    .confirm-btns .yes { background: #ff4757; color: white; }
    .confirm-btns .no { background: #16213e; border: 1px solid #333; color: #e0e0e0; }

    /* AI 聊天面板 */
    .ai-fab { position: fixed; right: 24px; bottom: 24px; width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: #fff; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 20px rgba(102,126,234,0.4); z-index: 900; transition: transform 0.2s; }
    .ai-fab:hover { transform: scale(1.1); }
    .ai-panel { position: fixed; right: 24px; bottom: 88px; width: 380px; max-height: 520px; background: #1a1a2e; border: 1px solid #333; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); z-index: 900; display: flex; flex-direction: column; overflow: hidden; }
    .ai-panel.hidden { display: none; }
    .ai-header { padding: 14px 18px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; justify-content: space-between; align-items: center; }
    .ai-header span { font-weight: 600; font-size: 0.95rem; }
    .ai-header button { background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer; font-size: 1.1rem; }
    .ai-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; min-height: 200px; max-height: 340px; }
    .ai-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
    .ai-msg.user { align-self: flex-end; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-bottom-right-radius: 4px; }
    .ai-msg.ai { align-self: flex-start; background: #16213e; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .ai-msg .use-btn { display: inline-block; margin-top: 6px; padding: 3px 10px; background: rgba(251,114,153,0.15); border: 1px solid rgba(251,114,153,0.3); border-radius: 4px; color: #fb7299; font-size: 0.72rem; cursor: pointer; }
    .ai-msg .use-btn:hover { background: rgba(251,114,153,0.25); }
    .ai-input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid #262640; }
    .ai-input-row input { flex: 1; padding: 8px 12px; background: #16213e; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 0.85rem; outline: none; }
    .ai-input-row input:focus { border-color: #667eea; }
    .ai-input-row button { padding: 8px 14px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
    .ai-input-row button:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <!-- 密码门控 -->
  <div id="pwdGate" class="pwd-gate">
    <div class="pwd-card">
      <h2>📢 通告管理</h2>
      <input type="password" id="pwdInput" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')unlock()">
      <br>
      <button onclick="unlock()">进入管理</button>
      <div class="err" id="pwdErr"></div>
    </div>
  </div>

  <!-- 管理主体 -->
  <div id="mainPanel" style="display:none">
    <div class="topbar">
      <h1>📢 通告管理</h1>
      <a href="/admin/dashboard">📊 数据看板 →</a>
    </div>

    <div class="wrap">
      <!-- 新增通告 -->
      <div class="card">
        <h2>✏️ 发布新通告</h2>
        <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
          <div><label>版本号</label><input type="text" id="version" placeholder="4.2.1" style="width:100px"></div>
          <div><label>日期</label><input type="date" id="annDate" style="width:150px"></div>
          <button type="button" style="padding:6px 12px;background:#16213e;border:1px solid #fb7299;border-radius:6px;color:#fb7299;cursor:pointer;font-size:0.8rem;height:36px" onclick="genTitle()">✨ 生成标题</button>
        </div>
        <label>通告标题（可手动修改）</label>
        <input type="text" id="title" placeholder="点击“生成标题”或自定义输入">
        <label>通告内容（支持换行）</label>
        <textarea id="content" placeholder="在这里写通告内容..."></textarea>
        <button type="button" style="margin-top:8px;padding:6px 14px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:0.82rem" onclick="aiRewrite('content','title')">🤖 AI 改写</button>
        <div class="row">
          <div class="toggle on" id="toggle" onclick="this.classList.toggle('on')"></div>
          <span style="font-size:0.85rem">启用</span>
        </div>
        <button class="btn" onclick="publish()">🚀 发布通告</button>
      </div>

      <!-- 历史通告 -->
      <div class="card">
        <h2>📋 历史通告</h2>
        <div class="ann-list" id="historyList">
          <div class="empty">加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="editModal" style="display:none" onclick="if(event.target===this)closeEdit()">
    <div class="modal">
      <h3>✏️ 编辑通告</h3>
      <input type="hidden" id="editId">
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
        <div><label>版本号</label><input type="text" id="editVersion" placeholder="4.2.1" style="width:100px"></div>
        <div><label>日期</label><input type="date" id="editDate" style="width:150px"></div>
        <button type="button" style="padding:6px 12px;background:#16213e;border:1px solid #fb7299;border-radius:6px;color:#fb7299;cursor:pointer;font-size:0.8rem;height:36px" onclick="genEditTitle()">✨ 生成标题</button>
      </div>
      <label>标题（可手动修改）</label>
      <input type="text" id="editTitle">
      <label>内容</label>
      <textarea id="editContent"></textarea>
      <button type="button" style="margin-top:8px;padding:6px 14px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:0.82rem" onclick="aiRewrite('editContent','editTitle')">🤖 AI 改写</button>
      <div class="row">
        <div class="toggle on" id="editToggle" onclick="this.classList.toggle('on')"></div>
        <span style="font-size:0.85rem">启用</span>
      </div>
      <div class="modal-btns">
        <button class="cancel" onclick="closeEdit()">取消</button>
        <button class="save" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div class="confirm-overlay" id="confirmModal" style="display:none">
    <div class="confirm-card">
      <p id="confirmMsg"></p>
      <div class="confirm-btns">
        <button class="no" onclick="confirmResolve(false)">取消</button>
        <button class="yes" onclick="confirmResolve(true)">确认</button>
      </div>
    </div>
  </div>

  <!-- AI 聊天面板 -->
  <button class="ai-fab" id="aiFab" onclick="toggleAiPanel()" title="AI 助手" style="display:none">🤖</button>
  <div class="ai-panel hidden" id="aiPanel">
    <div class="ai-header">
      <span>🤖 AI 通告助手</span>
      <div>
        <button onclick="clearAiChat()" title="清空对话">🗑️</button>
        <button onclick="toggleAiPanel()">✕</button>
      </div>
    </div>
    <div class="ai-messages" id="aiMessages">
      <div class="ai-msg ai">你好主人！我是通告编辑助手 😊
可以告诉我这次更新了什么，我来帮你写通告内容～</div>
    </div>
    <div class="ai-input-row">
      <input type="text" id="aiInput" placeholder="告诉 AI 你想写什么..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendAiMsg()">
      <button id="aiSendBtn" onclick="sendAiMsg()">发送</button>
    </div>
  </div>

  <script>
    // ---- 密码缓存 (sessionStorage + 30分钟过期) ----
    const PWD_KEY = 'admin_pwd';
    const PWD_TS_KEY = 'admin_pwd_ts';
    const PWD_TTL = 30 * 60 * 1000; // 30 分钟

    function savePwd(p) {
      sessionStorage.setItem(PWD_KEY, p);
      sessionStorage.setItem(PWD_TS_KEY, Date.now().toString());
    }
    function loadPwd() {
      const p = sessionStorage.getItem(PWD_KEY);
      const ts = parseInt(sessionStorage.getItem(PWD_TS_KEY) || '0');
      if (p && (Date.now() - ts < PWD_TTL)) return p;
      sessionStorage.removeItem(PWD_KEY);
      sessionStorage.removeItem(PWD_TS_KEY);
      return null;
    }

    let pwd = '';
    let annDataCache = [];

    // ---- 自动登录 ----
    (function autoLogin() {
      const cached = loadPwd();
      if (cached) {
        pwd = cached;
        verifyAndEnter(pwd);
      }
    })();

    function unlock() {
      pwd = document.getElementById('pwdInput').value;
      if (!pwd) { document.getElementById('pwdErr').textContent = '请输入密码'; return; }
      verifyAndEnter(pwd);
    }

    async function verifyAndEnter(p) {
      try {
        const res = await fetch('/api/admin/announcements?password=' + encodeURIComponent(p));
        const json = await res.json();
        if (json.success) {
          pwd = p;
          savePwd(p);
          document.getElementById('pwdGate').style.display = 'none';
          document.getElementById('mainPanel').style.display = 'block';
          annDataCache = json.data || [];
          renderHistory(annDataCache);
        } else {
          document.getElementById('pwdErr').textContent = '密码错误';
        }
      } catch {
        document.getElementById('pwdErr').textContent = '无法连接服务器';
      }
    }

    // ---- Toast 通知 ----
    function toast(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2000);
    }

    // ---- 自定义确认弹窗 ----
    let confirmResolve = () => {};
    function showConfirm(msg) {
      return new Promise(resolve => {
        document.getElementById('confirmMsg').textContent = msg;
        document.getElementById('confirmModal').style.display = 'flex';
        document.body.classList.add('no-scroll');
        confirmResolve = (val) => {
          document.getElementById('confirmModal').style.display = 'none';
          document.body.classList.remove('no-scroll');
          resolve(val);
        };
      });
    }

    // ---- 通告列表渲染 ----
    function renderHistory(list) {
      const el = document.getElementById('historyList');
      if (!list.length) { el.innerHTML = '<div class="empty">暂无通告</div>'; return; }
      el.innerHTML = list.map((a, i) => {
        const lines = (a.content || '').split('\n').length;
        const needExpand = (a.content || '').length > 80 || lines > 3;
        return `
        <div class="ann-card-item ${a.enabled ? '' : 'disabled'}" data-id="${a.id}">
          <div class="title"><span style="color:#555;font-size:0.75rem;margin-right:6px">#${i + 1}</span>${esc(a.title || '无标题')}</div>
          <div class="content" id="content-${a.id}">${esc(a.content)}</div>
          ${needExpand ? `<button class="expand-btn" data-action="expand" data-id="${a.id}">▼ 展开</button>` : ''}
          <div class="meta">
            <span>${new Date(a.updatedAt).toLocaleString('zh-CN')} · <span class="${a.enabled ? 'tag-on' : 'tag-off'}">${a.enabled ? '已启用' : '已禁用'}</span></span>
            <div class="btn-group">
              <button class="act-btn" data-action="up" data-id="${a.id}" ${i === 0 ? 'disabled' : ''}>▲</button>
              <button class="act-btn" data-action="down" data-id="${a.id}" ${i === list.length - 1 ? 'disabled' : ''}>▼</button>
              <button class="act-btn ${a.enabled ? '' : 'off'}" data-action="toggle" data-id="${a.id}">${a.enabled ? '禁用' : '启用'}</button>
              <button class="act-btn" data-action="edit" data-id="${a.id}">编辑</button>
              <button class="act-btn" data-action="delete" data-id="${a.id}">删除</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // ---- 事件委托：统一处理按钮点击 ----
    document.getElementById('historyList').addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;

      if (action === 'edit') {
        editAnn(id);
      } else if (action === 'toggle') {
        const item = annDataCache.find(a => a.id === id);
        const label = item?.enabled ? '禁用' : '启用';
        const ok = await showConfirm(`确定${label}这条通告？`);
        if (!ok) return;
        await toggleAnn(id);
      } else if (action === 'delete') {
        const ok = await showConfirm('确定删除这条通告？删除后不可恢复。');
        if (!ok) return;
        await delAnn(id);
      } else if (action === 'up' || action === 'down') {
        await reorderAnn(id, action);
      } else if (action === 'expand') {
        const content = document.getElementById('content-' + id);
        if (content) {
          content.classList.toggle('expanded');
          btn.textContent = content.classList.contains('expanded') ? '▲ 收起' : '▼ 展开';
        }
      }
    });

    // ---- API 操作 ----
    async function loadHistory() {
      try {
        const res = await fetch('/api/admin/announcements?password=' + encodeURIComponent(pwd) + '&_t=' + Date.now(), { cache: 'no-store' });
        const json = await res.json();
        if (json.success) {
          annDataCache = json.data || [];
          renderHistory(annDataCache);
        }
      } catch { toast('加载失败', 'err'); }
    }

    // 默认填入今天日期
    document.getElementById('annDate').value = new Date().toISOString().slice(0, 10);

    // 生成标题（发布表单）
    function genTitle() {
      const ver = document.getElementById('version').value.trim();
      const date = document.getElementById('annDate').value;
      if (!ver) { toast('请先填写版本号', 'err'); return; }
      document.getElementById('title').value = `📢 QYBILI ver ${ver} (${date || new Date().toISOString().slice(0, 10)})`;
    }

    // 生成标题（编辑弹窗）
    function genEditTitle() {
      const ver = document.getElementById('editVersion').value.trim();
      const date = document.getElementById('editDate').value;
      if (!ver) { toast('请先填写版本号', 'err'); return; }
      document.getElementById('editTitle').value = `📢 QYBILI ver ${ver} (${date || new Date().toISOString().slice(0, 10)})`;
    }

    // 解析标题中的版本号和日期
    function parseTitle(title) {
      const m = (title || '').match(/QYBILI\s+ver\s+([\d.]+)\s*\(([\d-]+)\)/);
      return m ? { version: m[1], date: m[2] } : { version: '', date: '' };
    }

    async function publish() {
      if (!pwd) { toast('未验证密码', 'err'); return; }
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value;
      if (!title) { toast('请填写或生成标题', 'err'); return; }
      if (!content) { toast('请填写通告内容', 'err'); return; }
      try {
        const res = await fetch('/api/admin/announcement', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: pwd,
            title, content,
            enabled: document.getElementById('toggle').classList.contains('on'),
          }),
        });
        const json = await res.json();
        if (json.success) {
          toast('✅ 通告已发布', 'ok');
          document.getElementById('version').value = '';
          document.getElementById('title').value = '';
          document.getElementById('content').value = '';
          await loadHistory();
        } else {
          toast('❌ ' + (json.error || '发布失败'), 'err');
        }
      } catch { toast('网络错误', 'err'); }
    }

    async function toggleAnn(id) {
      try {
        const res = await fetch('/api/admin/announcement/' + id + '/toggle', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd }),
        });
        const json = await res.json();
        if (json.success && json.data) {
          // 直接用返回值更新本地缓存，不依赖重新 GET
          const idx = annDataCache.findIndex(a => a.id === id);
          if (idx !== -1) annDataCache[idx] = json.data;
          renderHistory(annDataCache);
          toast('✅ 状态已切换', 'ok');
        } else {
          toast('❌ 操作失败', 'err');
        }
      } catch { toast('网络错误', 'err'); }
    }

    async function delAnn(id) {
      try {
        const res = await fetch('/api/admin/announcement/' + id + '?password=' + encodeURIComponent(pwd), { method: 'DELETE' });
        const json = await res.json();
        if (json.success) {
          // 直接从本地缓存移除
          annDataCache = annDataCache.filter(a => a.id !== id);
          renderHistory(annDataCache);
          toast('✅ 已删除', 'ok');
        } else {
          toast('❌ 删除失败', 'err');
        }
      } catch { toast('网络错误', 'err'); }
    }

    async function reorderAnn(id, direction) {
      try {
        const res = await fetch('/api/admin/announcements/reorder', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd, id, direction }),
        });
        const json = await res.json();
        if (json.success) {
          annDataCache = json.data || [];
          renderHistory(annDataCache);
        } else {
          toast('❌ 排序失败', 'err');
        }
      } catch { toast('网络错误', 'err'); }
    }

    // ---- 编辑弹窗 ----
    function editAnn(id) {
      const item = annDataCache.find(a => a.id === id);
      if (!item) return;
      document.getElementById('editId').value = id;
      document.getElementById('editTitle').value = item.title || '';
      document.getElementById('editContent').value = item.content || '';
      // 解析已有标题中的版本号和日期
      const parsed = parseTitle(item.title);
      document.getElementById('editVersion').value = parsed.version;
      document.getElementById('editDate').value = parsed.date;
      const tog = document.getElementById('editToggle');
      tog.classList.toggle('on', item.enabled);
      document.getElementById('editModal').style.display = 'flex';
      document.body.classList.add('no-scroll');
    }

    function closeEdit() {
      document.getElementById('editModal').style.display = 'none';
      document.body.classList.remove('no-scroll');
    }

    async function saveEdit() {
      const id = document.getElementById('editId').value;
      try {
        const res = await fetch('/api/admin/announcement/' + id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: pwd,
            title: document.getElementById('editTitle').value,
            content: document.getElementById('editContent').value,
            enabled: document.getElementById('editToggle').classList.contains('on'),
          }),
        });
        const json = await res.json();
        if (json.success) {
          toast('✅ 保存成功', 'ok');
          closeEdit();
          await loadHistory();
        } else {
          toast('❌ ' + (json.error || '保存失败'), 'err');
        }
      } catch { toast('网络错误', 'err'); }
    }

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ---- AI 聊天面板 ----
    const aiChatHistory = [];

    // 登录成功后显示 FAB
    const origVerify = verifyAndEnter;
    // 已经在 autoLogin/unlock 中调用，我们 hook 它
    const _origSavePwd = savePwd;
    function hookShowFab() {
      document.getElementById('aiFab').style.display = 'block';
    }
    // 简单方法：监听 mainPanel 显示
    new MutationObserver(() => {
      if (document.getElementById('mainPanel').style.display !== 'none') hookShowFab();
    }).observe(document.getElementById('mainPanel'), { attributes: true, attributeFilter: ['style'] });

    function toggleAiPanel() {
      document.getElementById('aiPanel').classList.toggle('hidden');
    }

    function clearAiChat() {
      aiChatHistory.length = 0;
      document.getElementById('aiMessages').innerHTML = '<div class="ai-msg ai">你好主人！我是通告编辑助手 😊\n可以告诉我这次更新了什么，我来帮你写通告内容～</div>';
    }

    function addAiMsg(text, role, showUseBtn) {
      const box = document.getElementById('aiMessages');
      const div = document.createElement('div');
      div.className = 'ai-msg ' + role;
      div.textContent = text;
      if (showUseBtn && role === 'ai') {
        const btn = document.createElement('button');
        btn.className = 'use-btn';
        btn.textContent = '📋 填入内容框';
        btn.onclick = () => {
          // 填入当前可见的内容框（发布或编辑）
          const editModal = document.getElementById('editModal');
          const targetId = (editModal.style.display !== 'none') ? 'editContent' : 'content';
          document.getElementById(targetId).value = text;
          toast('✅ 已填入内容框', 'ok');
        };
        div.appendChild(document.createElement('br'));
        div.appendChild(btn);
      }
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    async function sendAiMsg() {
      const input = document.getElementById('aiInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addAiMsg(text, 'user');
      aiChatHistory.push({ role: 'user', content: text });

      const btn = document.getElementById('aiSendBtn');
      btn.disabled = true;
      btn.textContent = '思考中...';

      // 显示思考中气泡
      const thinkDiv = document.createElement('div');
      thinkDiv.className = 'ai-msg ai';
      thinkDiv.textContent = '✨ 思考中...';
      document.getElementById('aiMessages').appendChild(thinkDiv);
      document.getElementById('aiMessages').scrollTop = document.getElementById('aiMessages').scrollHeight;

      try {
        const res = await fetch('/api/admin/ai-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd, message: text, history: aiChatHistory.slice(-10) }),
        });
        const json = await res.json();
        thinkDiv.remove();
        if (json.success && json.data) {
          aiChatHistory.push({ role: 'assistant', content: json.data });
          addAiMsg(json.data, 'ai', true);
        } else {
          addAiMsg('❌ ' + (json.error || '回复失败'), 'ai');
        }
      } catch {
        thinkDiv.remove();
        addAiMsg('❌ 网络错误', 'ai');
      } finally {
        btn.disabled = false;
        btn.textContent = '发送';
      }
    }
    async function aiRewrite(contentId, titleId) {
      const contentEl = document.getElementById(contentId);
      const raw = contentEl.value.trim();
      if (!raw) { toast('请先填写内容再改写', 'err'); return; }
      const title = document.getElementById(titleId)?.value || '';
      const btn = event.target;
      const origText = btn.textContent;
      btn.textContent = '✨ AI 改写中...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/admin/ai-rewrite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd, content: raw, title }),
        });
        const json = await res.json();
        if (json.success && json.data) {
          contentEl.value = json.data;
          toast('✨ AI 改写完成', 'ok');
        } else {
          toast('❌ ' + (json.error || '改写失败'), 'err');
        }
      } catch {
        toast('网络错误', 'err');
      } finally {
        btn.textContent = origText;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
